<!DOCTYPE html>
<html lang="pt-br">
<head>

        <meta charset="UTF-8">
        <title> Banco Dev</title>
        <!-- CONHEXÃO COM O CSS-->
        <link rel="stylesheet" href="style.css">
<meta name="viewport" content="width-device, initial-scale=1.0">
</head>
<body>
    <div class="conteiner"> <!-- agrupa tudo como se fosse um celular-->

        <!-- Bloco 1: Topo -->
    <div class="topo">  <!-- Div= Caixa/bloco generico--> 
        <h2>Banco Dev</h2>
        <p>Bem vindo, <span style="color: red;">Felipe</span></p> <!-- Descrição-->
    </div>

    <!-- Bloco 2: Saldo-->
    <div class="saldo">
        <span>Saldo:</span> <!--Melhora o alinhamento-->
        <h2>R$ 2.000,00</h2> <!-- Saldo -->
    </div>

    <!-- Bloco 3: Ações-->
    <div class="acoes">
        <button>Transferir</button>
        <button>Pagar</button>
        <button>Extrato</button>
    </div>

    <!-- Bloco 4: Transações-->
    <div class="transacoes">

    <!--Cada transaçao virou um bloco separado-->
        <div class="itemS"></div>
        <p>Transferencias Feitas:</p>
        <span>-R$100,00</span>
        </div>
            
   <div> 

    <div class="item"> 
     <span>Boleto pago:</span>
    <span>-R$200,00</span>
    </div>
    <div class="item">
        <span>Transferencias Recebidas:</span>
        <span>+R$100,00</span>
      

    </div>
        
</div>

    <div class="card">
        <p>Cartão de credito</p>
        <h3> R$ 50.000,00</h3>
    </div>
    <div class="card inteligente">
        <h3>Dica:</h3>
        <p> Você gastou menos essa semana</p>
        <span>Continue Economizando</span>
    </div>
</body>
</html>
